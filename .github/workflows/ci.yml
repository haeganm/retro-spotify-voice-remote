name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      # pinned to commit SHAs (supply-chain hygiene); comments track the tag
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff
      - name: Lint
        run: ruff check retro/ test_intents.py e2e_voice.py
      - name: Tests
        run: python test_intents.py
