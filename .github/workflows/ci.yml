name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff
      - name: Lint
        run: ruff check retro/ test_intents.py e2e_voice.py
      - name: Tests
        run: python test_intents.py
